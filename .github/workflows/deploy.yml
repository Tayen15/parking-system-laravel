name: Build Laravel Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_ref: ${{ steps.vars.outputs.image_ref }}
      image_latest: ${{ steps.vars.outputs.image_latest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image variables
        id: vars
        run: |
          OWNER_LOWER=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          IMAGE_REPO="${OWNER_LOWER}/sistem-parkir-laravel"
          IMAGE_REF="${{ env.REGISTRY }}/${IMAGE_REPO}:${GITHUB_SHA}"
          IMAGE_LATEST="${{ env.REGISTRY }}/${IMAGE_REPO}:latest"

          echo "image_ref=${IMAGE_REF}" >> "$GITHUB_OUTPUT"
          echo "image_latest=${IMAGE_LATEST}" >> "$GITHUB_OUTPUT"
          echo "image_repo=${IMAGE_REPO}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.vars.outputs.image_ref }}
            ${{ steps.vars.outputs.image_latest }}

      - name: Show image tags
        run: |
          echo "SHA tag   : ${{ steps.vars.outputs.image_ref }}"
          echo "Latest tag: ${{ steps.vars.outputs.image_latest }}"
